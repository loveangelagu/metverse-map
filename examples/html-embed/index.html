<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetVerse Map — Embed Example</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  </style>
</head>
<body>
  <!-- Web Component usage -->
  <metverse-map
    header="CANGGU DISTRICT"
    border-color="#6a28d9"
    accent="#00d4aa"
    secondary="#f0a030"
    primary="#1a1a2e"
    text-color="#e0e0e0"
    text-muted="#888888"
    width="100%"
    height="600px"
    min-height="400">
  </metverse-map>

  <!-- Load the widget bundle (includes React + PixiJS + GSAP) -->
  <script src="../../dist/widget.global.js"></script>

  <!-- Advanced: configure via JS after load -->
  <script>
    const map = document.querySelector('metverse-map')
    map.setProps({
      stats: { members: 247, activeNow: 12, districts: 3 },
      activities: [
        { user: '@RyoNomad', action: 'found collab via', target: 'Nomeo' },
        { user: '@SaraMoves', action: 'matched through', target: 'Padel Island' },
        { user: '@MariaTB', action: 'discovered', target: 'Terra Bali' },
        { user: '@DiegoGIA', action: 'connected at', target: 'Give It All' },
        { user: '@PxlYuki', action: 'joined', target: 'Nirvana' },
      ],
    })
  </script>
</body>
</html>
