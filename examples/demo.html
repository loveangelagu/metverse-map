<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetVerse Map – Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #e8e4d8;
      min-height: 100vh;
    }
    #map-container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div id="map-container"></div>

  <!-- Widget bundle (self-contained — build first with: npm run build) -->
  <script src="../dist/widget.global.js"></script>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.body.innerHTML = '<pre style="color:red;padding:2rem">' + msg + '\n' + src + ':' + line + '\n' + (err && err.stack || '') + '</pre>'
    }

    var mount = MetVerseMap.mount || (MetVerseMap.default && MetVerseMap.default.mount)
    if (!mount) {
      document.body.innerHTML = '<pre style="color:red;padding:2rem">MetVerseMap.mount not found.\nKeys: ' + Object.keys(MetVerseMap).join(', ') + '</pre>'
    } else {
      mount(document.getElementById('map-container'), {
        headerText: 'CANGGU DISTRICT',
        stats: { members: 247, activeNow: 12, districts: 3 },
      })
    }
  </script>
</body>
</html>
